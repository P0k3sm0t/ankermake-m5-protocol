name: Release

on:
  push:
    tags:
     - v**
     
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
        cache: pip
        cache-dependency-path: |
          requirements.txt
          requirements-dev.txt

    - name: Log into registry ${{ env.REGISTRY }}
      if: github.event_name == 'push'
      uses: docker/login-action@v4.0.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Docker Setup QEMU
      uses: docker/setup-qemu-action@v4.0.0
      
    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v4.0.0
      with:
        version: latest
        install: true
        
    - name: Docker Metadata action
      id: meta
      if: github.event_name == 'push'
      uses: docker/metadata-action@v6.0.0
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        flavor: |
          latest=${{ github.event_name == 'push' }}
        tags: ${{ github.ref_name }}
        
    - name: Build and push Docker images
      uses: docker/build-push-action@v7.0.0
      with:
        context: .
        file: Dockerfile
        platforms: linux/arm/v7,linux/arm64,linux/amd64
        push: ${{ github.event_name == 'push' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
    
    - name: Create release directory
      run: mkdir release

    - name: Install release bundling dependencies
      if: github.event_name == 'push'
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt "pyinstaller<7"

    - name: Build Linux release bundle
      if: github.event_name == 'push'
      run: |
        python -m PyInstaller --noconfirm --clean packaging/pyinstaller/ankerctl.spec
        ./dist/ankerctl/ankerctl --help >/dev/null
        tar -C dist -czf release/ankerctl-${{ github.ref_name }}-linux-amd64.tar.gz ankerctl

    - name: Zip Release
      if: github.event_name == 'push'
      uses: TheDoctor0/zip-release@0.7.6
      with:
        type: 'zip'
        filename: release/ankerctl-${{ github.ref_name }}.zip
        exclusions: '*.git* /*release/* /*dist/*'
        
    - name: GZip Release
      if: github.event_name == 'push'
      uses: TheDoctor0/zip-release@0.7.6
      with:
        type: 'tar'
        filename: release/ankerctl-${{ github.ref_name }}.tar.gz
        exclusions: '*.git* release dist'
        
    - name: Release
      if: ${{ github.event_name == 'push' }}
      uses: docker://antonyurchenko/git-release:v5.0.1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        args: release/ankerctl*
  
